services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - db_data:/app/prisma
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - NODE_ENV=production
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/clients', r => process.exit(r.statusCode >= 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

  nginx:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
