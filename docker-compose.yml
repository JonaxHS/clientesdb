services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - db_data:/app/prisma/data
      - ./caddy:/app/caddy-config # web writes Caddyfile here
    environment:
      - DATABASE_URL=file:./data/dev.db
      - NODE_ENV=production
      - ADMIN_PASSWORD=Admin1234 # CAMBIA ESTO en produccion
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/clients', r => process.exit(r.statusCode >= 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  db_data:
  caddy_data:
  caddy_config:
