services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - db_data:/app/prisma
      - ./nginx:/app/nginx-config # web writes nginx configs here
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - NODE_ENV=production
      - ADMIN_PASSWORD=Admin1234 # CAMBIA ESTO en produccion
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/clients', r => process.exit(r.statusCode >= 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

  nginx:
    image: nginx:alpine
    ports:
      - "3001:80"
      - "3443:443" # para SSL cuando lo configures
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro # nginx lee configs de aqui
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  certbot_certs:
