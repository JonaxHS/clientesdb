services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - db_data:/app/prisma
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - NODE_ENV=production
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/clients || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
